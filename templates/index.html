<!DOCTYPE html>
<html>
<head>
    <title>Inventory System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #f5f7fb, #e3ecff);
            min-height: 100vh;
        }

        .card {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .main-title {
            font-weight: 700;
        }

        .icon {
            font-size: 45px;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="container text-center">

    <!-- Title -->
    <h1 class="mb-2 main-title">📦 Inventory Management</h1>
    <p class="text-muted mb-5">Retail POS System</p>

    <!-- Cards -->
    <div class="row justify-content-center g-4">

        <!-- Order -->
        <div class="col-md-3">
            <div class="card p-4">
                <i class="bi bi-cart icon text-primary"></i>
                <h5 class="mt-3">New Order</h5>
                <p class="text-muted small">Scan & generate bill</p>

                <a href="/order" class="btn btn-primary w-100">
                    Open
                </a>
            </div>
        </div>

        <!-- Products -->
        <div class="col-md-3">
            <div class="card p-4">
                <i class="bi bi-box-seam icon text-success"></i>
                <h5 class="mt-3">Products</h5>
                <p class="text-muted small">Manage inventory</p>

                <a href="/products" class="btn btn-success w-100">
                    Open
                </a>
            </div>
        </div>

        <!-- Bills -->
        <div class="col-md-3">
            <div class="card p-4">
                <i class="bi bi-receipt icon text-warning"></i>
                <h5 class="mt-3">Bills</h5>
                <p class="text-muted small">View all records</p>

                <a href="/bills" class="btn btn-warning w-100 text-white">
                    Open
                </a>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <p class="mt-5 text-muted">⚡ Fast • Simple • Barcode Powered</p>

</div>

</body>
</html>
